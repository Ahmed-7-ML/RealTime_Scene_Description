name: Deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and Push Docker image
      run: |
        docker build -t visionassistapp:latest .
        docker tag visionassistapp:latest <YOUR_ACR_NAME>.azurecr.io/visionassistapp:latest
        docker push <YOUR_ACR_NAME>.azurecr.io/visionassistapp:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: vision-assist
        images: <YOUR_ACR_NAME>.azurecr.io/visionassistapp:latest
